<div class="alerts-page-container">

  <!-- Header Row -->
  <div class="alerts-page-header">
    <div class="alerts-header-left">
      <div class="alerts-summary">
        <div class="summary-pill critical">
          <span class="summary-dot"></span>
          <span id="count-critical">—</span> Critical
        </div>
        <div class="summary-pill warning">
          <span class="summary-dot"></span>
          <span id="count-warning">—</span> Warning
        </div>
        <div class="summary-pill info">
          <span class="summary-dot"></span>
          <span id="count-info">—</span> Info
        </div>
      </div>
    </div>
    <div class="alerts-header-right">
      <!-- Filter Tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="active">Active</button>
        <button class="filter-tab" data-filter="resolved">Resolved</button>
      </div>
      <!-- Severity Filter -->
      <div class="severity-select-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <select id="severity-filter" class="severity-select">
          <option value="all">All Severities</option>
          <option value="critical">Critical</option>
          <option value="warning">Warning</option>
          <option value="info">Info</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Alerts Table Card -->
  <div class="card full-width alerts-card">
    <div class="card-header">
      <div class="card-header-left">
        <div class="card-icon-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <h3>Alert Log</h3>
      </div>
      <span class="timestamp-badge" id="alerts-timestamp">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Loading...
      </span>
    </div>

    <div class="alerts-table-container">
      <table class="alerts-table">
        <thead>
          <tr>
            <th>Severity</th>
            <th>Type</th>
            <th>Message</th>
            <th>Entity</th>
            <th>Time</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="alerts-table-body">
          <tr><td colspan="7">
            <div class="table-empty">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Loading alerts...
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Thresholds Reference Card -->
  <div class="card full-width">
    <div class="card-header">
      <div class="card-header-left">
        <div class="card-icon-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <h3>Sensor Thresholds</h3>
      </div>
    </div>
    <div class="thresholds-grid" id="thresholds-grid">
      <div class="loading">Loading thresholds...</div>
    </div>
  </div>

</div>

<script type="module">
import { getAllAlerts } from '../utils/dataService.js';

(function () {

  /* ── Fetch alerts.json ── */
  getAllAlerts()
    .then(alerts => init(alerts))
    .catch(err => { console.error('Failed to load alerts:', err); });

  function init(alerts) {

    const TYPE_LABELS = {
      low_stock:   'Low Stock',
      irrigation:  'Irrigation',
      weather:     'Weather',
      equipment:   'Equipment',
      temperature: 'Temperature',
      humidity:    'Humidity',
      harvest:     'Harvest',
    };

    const SEVERITY_ICONS = {
      critical: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
      warning:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
      info:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
    };

    // Thresholds — static reference data (no JSON file exists for this yet)
    const THRESHOLDS = [
      { sensor: 'Soil Moisture', unit: '%',     critical: '< 15',  warning: '< 30',  optimal: '30 – 70' },
      { sensor: 'Temperature',   unit: '°C',    critical: '> 38',  warning: '> 32',  optimal: '15 – 30' },
      { sensor: 'Humidity',      unit: '%',     critical: '< 20',  warning: '< 35',  optimal: '40 – 80' },
      { sensor: 'Soil pH',       unit: 'pH',    critical: '< 5.5', warning: '< 6.0', optimal: '6.0 – 7.5' },
      { sensor: 'Nitrogen',      unit: 'mg/kg', critical: '< 20',  warning: '< 35',  optimal: '35 – 80' },
    ];

    let allAlerts     = alerts;
    let currentFilter   = 'all';
    let currentSeverity = 'all';

    /* ── Helpers ── */
    function severityBadge(severity) {
      return `<span class="alert-severity-badge badge-${severity}">
        ${SEVERITY_ICONS[severity] || ''}
        ${severity.charAt(0).toUpperCase() + severity.slice(1)}
      </span>`;
    }

    function statusPill(status) {
      const labels = { active: 'Active', resolved: 'Resolved', acknowledged: 'Acknowledged' };
      return `<span class="status-pill status-pill-${status}"><span class="status-dot"></span>${labels[status] || status}</span>`;
    }

    function typeBadge(type) {
      return `<span class="type-badge">${TYPE_LABELS[type] || type}</span>`;
    }

    function timeAgo(timestamp) {
      const diff = Date.now() - new Date(timestamp).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1)  return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24)  return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    /* ── Counts ── */
    function updateCounts() {
      document.getElementById('count-critical').textContent = allAlerts.filter(a => a.severity === 'critical').length;
      document.getElementById('count-warning').textContent  = allAlerts.filter(a => a.severity === 'warning').length;
      document.getElementById('count-info').textContent     = allAlerts.filter(a => a.severity === 'info').length;
    }

    function getFiltered() {
      return allAlerts.filter(a => {
        const statusOk   = currentFilter   === 'all' || a.status   === currentFilter;
        const severityOk = currentSeverity === 'all' || a.severity === currentSeverity;
        return statusOk && severityOk;
      });
    }

    /* ── Table ── */
    function renderTable() {
      const tbody    = document.getElementById('alerts-table-body');
      const filtered = getFiltered();

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="table-empty">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          No alerts match your filters
        </div></td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(alert => `
        <tr class="alert-row alert-row-${alert.severity} ${alert.status === 'resolved' ? 'resolved-row' : ''}" data-id="${alert.id}">
          <td>${severityBadge(alert.severity)}</td>
          <td>${typeBadge(alert.type)}</td>
          <td class="alert-msg-cell">
            <span class="alert-msg-text">${alert.message}</span>
          </td>
          <td class="alert-entity-cell">
            <span class="entity-tag">${alert.entityId ?? '—'}</span>
            <span class="entity-type">${alert.entityType ?? ''}</span>
          </td>
          <td class="alert-time-cell">
            <span class="time-main">${timeAgo(alert.timestamp)}</span>
            <span class="time-sub">${new Date(alert.timestamp).toLocaleString()}</span>
          </td>
          <td>${statusPill(alert.status)}</td>
          <td>
            ${alert.status === 'active'
              ? `<button class="dismiss-btn" data-id="${alert.id}">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                  Dismiss
                </button>`
              : `<span class="resolved-label">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                  ${alert.status === 'acknowledged' ? 'Acknowledged' : 'Resolved'}
                </span>`
            }
          </td>
        </tr>
      `).join('');

      // Dismiss buttons
      tbody.querySelectorAll('.dismiss-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id    = parseInt(btn.dataset.id);
          const alert = allAlerts.find(a => a.id === id);
          if (alert) {
            alert.status = 'resolved';
            updateCounts();
            renderTable();
            // Update nav badge if present
            const badge = document.getElementById('alert-badge');
            if (badge) {
              const activeCount = allAlerts.filter(a => a.status === 'active').length;
              badge.textContent    = activeCount;
              badge.style.display  = activeCount > 0 ? 'inline-block' : 'none';
            }
          }
        });
      });
    }

    /* ── Thresholds ── */
    function renderThresholds() {
      document.getElementById('thresholds-grid').innerHTML = THRESHOLDS.map(t => `
        <div class="threshold-item">
          <div class="threshold-header">
            <span class="threshold-sensor">${t.sensor}</span>
            <span class="threshold-unit">${t.unit}</span>
          </div>
          <div class="threshold-row">
            <span class="threshold-label tl-critical">Critical</span>
            <span class="threshold-value tv-critical">${t.critical}</span>
          </div>
          <div class="threshold-row">
            <span class="threshold-label tl-warning">Warning</span>
            <span class="threshold-value tv-warning">${t.warning}</span>
          </div>
          <div class="threshold-row">
            <span class="threshold-label tl-optimal">Optimal</span>
            <span class="threshold-value tv-optimal">${t.optimal}</span>
          </div>
        </div>
      `).join('');
    }

    /* ── Filters ── */
    function initFilters() {
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentFilter = tab.dataset.filter;
          renderTable();
        });
      });

      document.getElementById('severity-filter').addEventListener('change', e => {
        currentSeverity = e.target.value;
        renderTable();
      });
    }

    /* ── Timestamp ── */
    function updateTimestamp() {
      document.getElementById('alerts-timestamp').innerHTML = `
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Updated ${new Date().toLocaleTimeString()}`;
    }

    /* ── Init ── */
    initFilters();
    updateCounts();
    renderTable();
    renderThresholds();
    updateTimestamp();

  } // end init()

})();
</script>
