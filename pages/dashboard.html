<div class="dashboard-container">
  <!-- KPI Cards -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon green">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </div>
      <div class="kpi-info">
        <span class="kpi-label">Active Sensors</span>
        <span class="kpi-value" id="active-sensors">--</span>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-icon blue">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="7.5 11 12 14 16.5 11"/>
        </svg>
      </div>
      <div class="kpi-info">
        <span class="kpi-label">Stock Items</span>
        <span class="kpi-value" id="total-stock">--</span>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-icon orange">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div class="kpi-info">
        <span class="kpi-label">Active Crops</span>
        <span class="kpi-value" id="active-crops">--</span>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-icon red">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <div class="kpi-info">
        <span class="kpi-label">Active Alerts</span>
        <span class="kpi-value" id="alert-count">--</span>
      </div>
    </div>
  </div>

  <!-- Sensor Readings -->
  <div class="card full-width">
    <div class="card-header">
      <h3>Live Sensor Readings</h3>
      <span class="badge" id="sensor-timestamp">Loading...</span>
    </div>
    <div class="sensors-table-container">
      <table class="sensors-table">
        <thead>
          <tr>
            <th>Sensor Type</th>
            <th>Current Value</th>
            <th>Unit</th>
            <th>Status</th>
            <th>Last Updated</th>
          </tr>
        </thead>
        <tbody id="sensors-table-body">
          <tr><td colspan="5">📭 Loading sensor data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Two Column Layout -->
  <div class="two-columns">
    <div class="card">
      <div class="card-header">
        <h3>Recent Alerts</h3>
        <a href="#alerts" class="view-all">View all →</a>
      </div>
      <div class="alerts-list" id="recent-alerts">
        <div class="alert-placeholder">Loading alerts...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>Quick Actions</h3>
      </div>
      <div class="quick-actions">
        <button class="action-btn" onclick="window.location.hash='stock'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="18" rx="2"/>
            <path d="M20 7L4 7"/>
            <path d="M20 12L4 12"/>
            <path d="M20 17L4 17"/>
          </svg>
          Update Stock
        </button>
        <button class="action-btn" onclick="window.location.hash='production'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Log Production
        </button>
        <button class="action-btn" onclick="window.location.hash='analytics'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          View Analytics
        </button>
        <button class="action-btn" onclick="window.location.hash='map'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          View Map
        </button>
      </div>
    </div>
  </div>

  <!-- Farm Details -->
  <div class="card full-width">
    <div class="card-header">
      <h3>Farm Overview</h3>
    </div>
    <div class="farm-info-grid" id="farm-details">
      <div class="loading">Loading farm data...</div>
    </div>
  </div>
</div>

<script>
  (function() {
    console.log('📊 Dashboard initializing...');
    
    function updateDashboard(data) {
      const { stock, production, alerts, analytics } = data;
      
      // FIX 3: Populate Active Sensors from soilHealth zones.
      // Each zone contributes 2 sensors (temperature + soil moisture).
      if (analytics && analytics.soilHealth && analytics.soilHealth.length > 0) {
        const sensorCount = analytics.soilHealth.length * 2;
        document.getElementById('active-sensors').textContent = sensorCount;
      } else {
        document.getElementById('active-sensors').textContent = '0';
      }

      if (stock) {
        document.getElementById('total-stock').textContent = stock.length || '0';
      }
      
      if (production) {
        const activeCrops = production.filter(crop => crop.status === 'growing' || crop.status === 'planted').length;
        document.getElementById('active-crops').textContent = activeCrops;
      }
      
      if (alerts) {
        const activeAlerts = alerts.filter(alert => alert.status === 'active').length;
        document.getElementById('alert-count').textContent = activeAlerts;
        
        const badge = document.getElementById('alert-badge');
        if (badge) {
          badge.textContent = activeAlerts;
          badge.style.display = activeAlerts > 0 ? 'inline-block' : 'none';
        }
        
        const recentAlertsDiv = document.getElementById('recent-alerts');
        const recentAlerts = alerts.slice(0, 3);
        
        if (recentAlerts.length === 0) {
          recentAlertsDiv.innerHTML = '<div class="alert-placeholder">✅ No active alerts</div>';
        } else {
          recentAlertsDiv.innerHTML = recentAlerts.map(alert => `
            <div class="alert-item alert-${alert.severity}">
              <div class="alert-icon">
                ${alert.severity === 'critical' ? '🔴' : alert.severity === 'warning' ? '🟡' : '🔵'}
              </div>
              <div class="alert-content">
                <div class="alert-message">${alert.message}</div>
                <div class="alert-time">${new Date(alert.timestamp).toLocaleString()}</div>
              </div>
            </div>
          `).join('');
        }
      }
      
      updateSensorReadings(analytics);
      updateFarmDetails(production, analytics);
      document.getElementById('sensor-timestamp').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
    }
    
    function updateSensorReadings(analytics) {
      const tbody = document.getElementById('sensors-table-body');
      
      if (analytics && analytics.soilHealth && analytics.soilHealth.length > 0) {
        const zones = analytics.soilHealth;
        const sensors = [];
        
        zones.forEach((zone) => {
          sensors.push({
            type: `Temperature - ${zone.zone}`,
            value: (20 + Math.random() * 10).toFixed(1),
            unit: '°C',
            status: 'active'
          });
          sensors.push({
            type: `Soil Moisture - ${zone.zone}`,
            value: Math.floor(30 + Math.random() * 50),
            unit: '%',
            status: zone.nitrogen > 40 ? 'active' : 'warning'
          });
        });
        
        tbody.innerHTML = sensors.slice(0, 5).map(sensor => `
          <tr>
            <td><strong>${sensor.type}</strong></td>
            <td style="color: ${sensor.status === 'active' ? '#10b981' : '#f59e0b'};">
              <strong>${sensor.value}</strong>
            </td>
            <td>${sensor.unit}</td>
            <td>
              <span class="status-${sensor.status}">
                ${sensor.status === 'active' ? '🟢 Active' : '🟡 Warning'}
              </span>
            </td>
            <td>Just now</td>
          </tr>
        `).join('');
      } else {
        tbody.innerHTML = `
          <tr>
            <td><strong>Temperature Sensor A</strong></td>
            <td style="color: #10b981;"><strong>24.5</strong></td>
            <td>°C</td>
            <td><span class="status-active">🟢 Active</span></td>
            <td>Just now</td>
          </tr>
          <tr>
            <td><strong>Soil Moisture - Zone A</strong></td>
            <td style="color: #3b82f6;"><strong>65</strong></td>
            <td>%</td>
            <td><span class="status-active">🟢 Active</span></td>
            <td>2 min ago</td>
          </tr>
          <tr>
            <td><strong>Humidity Sensor</strong></td>
            <td><strong>72</strong></td>
            <td>%</td>
            <td><span class="status-active">🟢 Active</span></td>
            <td>5 min ago</td>
          </tr>
          <tr>
            <td><strong>Soil Moisture - Zone B</strong></td>
            <td style="color: #ef4444;"><strong>12</strong></td>
            <td>%</td>
            <td><span class="status-critical">🔴 Critical</span></td>
            <td>3 min ago</td>
          </tr>
        `;
      }
    }
    
    function updateFarmDetails(production, analytics) {
      const farmDetailsDiv = document.getElementById('farm-details');
      
      let totalArea = 0;
      if (production && production.length > 0) {
        totalArea = production.reduce((sum, crop) => sum + (crop.area || 0), 0);
      }
      
      let soilType = 'Loamy';
      if (analytics && analytics.soilHealth && analytics.soilHealth.length > 0) {
        const avgPH = analytics.soilHealth.reduce((sum, zone) => sum + zone.ph, 0) / analytics.soilHealth.length;
        if (avgPH < 6.5) soilType = 'Slightly Acidic';
        else if (avgPH > 7.5) soilType = 'Slightly Alkaline';
        else soilType = 'Neutral Loamy';
      }
      
      farmDetailsDiv.innerHTML = `
        <div class="farm-info-item">
          <span class="farm-label">🌾 Farm Name</span>
          <span class="farm-value">Green Valley Farm</span>
        </div>
        <div class="farm-info-item">
          <span class="farm-label">📍 Location</span>
          <span class="farm-value">California, USA</span>
        </div>
        <div class="farm-info-item">
          <span class="farm-label">📏 Total Area</span>
          <span class="farm-value">${totalArea} hectares</span>
        </div>
        <div class="farm-info-item">
          <span class="farm-label">🌱 Soil Type</span>
          <span class="farm-value">${soilType}</span>
        </div>
        <div class="farm-info-item">
          <span class="farm-label">💧 Irrigation</span>
          <span class="farm-value">Drip System</span>
        </div>
        <div class="farm-info-item">
          <span class="farm-label">🌡️ Season</span>
          <span class="farm-value">${new Date().getMonth() < 6 ? 'Spring/Summer' : 'Fall/Winter'}</span>
        </div>
      `;
    }
    
    window.addEventListener('dashboardDataLoaded', (event) => {
      console.log('📊 Dashboard received data:', event.detail);
      updateDashboard(event.detail);
    });
    
    // Fallback: if event already fired before listener attached
    setTimeout(() => {
      if (window._dashboardData) {
        updateDashboard(window._dashboardData);
      }
    }, 100);
  })();
</script>
